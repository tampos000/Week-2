<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 40px;
        background-color: #f5f5f5;
        color: #333;
      }

      .container {
        max-width: 900px;
        margin: auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 6px;
        border: 1px solid #e0e0e0;
      }

      .layout {
        display: flex;
        gap: 20px;
      }

      .left {
        display: flex;
        flex-direction: column;
        gap: 20px;
        flex: 1;
      }

      .card {
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 4px;
        background: #fafafa;
      }

      .about {
        background-color: #f8c8dc;
      }

      .contact {
        background-color: #cce5ff;
      }

      .services {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        background-color: #d4edda;
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 20px;
      }

      .card h2 {
        margin: 0;
        font-size: 20px;
      }

      .btn {
        padding: 10px 20px;
        border: 1px solid #333;
        color: #333;
        text-decoration: none;
        border-radius: 4px;
        margin-top: 20px;
        transition: all 0.3s ease;
      }

      .btn:hover {
        background-color: #333;
        color: #fff;
        transform: scale(1.05);
      }

      #mousePos,
      #keyPress {
        margin-top: 10px;
        font-weight: bold;
        font-size: 16px;
      }

      #hoverMsg {
        margin-top: 10px;
        font-weight: bold;
        color: #155724;
      }

      #clickMsg {
        margin-top: 10px;
        font-weight: bold;
        color: #0b6623;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="layout">
        <div class="left">
          <div class="card about">
            <h2></h2>
            <div id="mousePos">Mouse: X=0, Y=0</div>
          </div>
          <div class="card contact">
            <h2></h2>
            <div id="keyPress">Last Key Pressed: None</div>
          </div>
        </div>
        <div class="services">
          <div>
            <h2></h2>
          </div>
          <a href="#" class="btn">Button</a>
          <div id="hoverMsg"></div>
          <div id="clickMsg"></div>
        </div>
      </div>
    </div>

    <script>
  document.addEventListener("mousemove", (event) => {
    const mouseDiv = document.getElementById("mousePos");
    mouseDiv.textContent = `Mouse: X=${event.clientX}, Y=${event.clientY}`;
  });

  document.addEventListener("keydown", (event) => {
    const keyDiv = document.getElementById("keyPress");
    keyDiv.textContent = `Last Key Pressed: ${event.key}`;
  });

  const btn = document.querySelector(".btn");
  const hoverMsg = document.getElementById("hoverMsg");
  const clickMsg = document.getElementById("clickMsg");

  btn.addEventListener("mouseenter", () => {
    hoverMsg.textContent = "You hovered the button!";
  });

  btn.addEventListener("mouseleave", () => {
    hoverMsg.textContent = "";
  });

  btn.addEventListener("click", (event) => {
    event.preventDefault();
    hoverMsg.textContent = "";
    clickMsg.textContent = "You clicked the button!";
  });
</script>
